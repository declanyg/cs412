{% extends "dadjokes/base.html" %}

{% block title %}Show Joke{% endblock %}

{% block content %}

<h3>Dad Joke - {{ joke.contributer_name }}</h3>

{% if joke %}
    <p>{{ joke.joke_text }}</p>
{% else %}
    <p>No joke available.</p>
{% endif %}

{% endblock %}
