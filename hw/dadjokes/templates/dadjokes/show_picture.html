{% extends "dadjokes/base.html" %}

{% block title %}Show Picture{% endblock %}
{% block content %}

<h3>Dad Joke Picture - {{ picture.contributor_name }}</h3>

{% if picture %}
    <img src="{{ picture.image_url }}" alt="Dad Joke Picture" style="max-width: 400px;">
{% else %}
    <p>No picture available.</p>
{% endif %}

{% endblock %}
