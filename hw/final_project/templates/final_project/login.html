{% extends "final_project/base.html" %}

{% block title %}Login - Final Project{% endblock %}

{% block content %}
<h3>Login</h3>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Log In</button>

    <input
        type="hidden"
        name="next"
        value="{% url 'final_project:show_all_restaurants' %}"
    >
</form>

{% endblock %}
