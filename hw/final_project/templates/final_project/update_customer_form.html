{% extends "final_project/base.html" %}

{% block title %}Update Customer - Final Project{% endblock %}
    
{% block content %}
<form method="post" action="{% url 'final_project:update_customer' %}" enctype="multipart/form-data">
    {% csrf_token %}
    <div style="width: 30%;">
        {{ form.as_p }}
    </div>
    <button type="submit">Update Customer</button>
    <a href="{% url 'final_project:show_customer' %}" class="cancel">Cancel</a>
</form>
{% endblock %}
